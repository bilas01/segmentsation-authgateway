# SegmentStation — Auth Gateway
# A mettre derrière un reverse proxy existant gérant TLS/Let's Encrypt
#


services:

  # ── PostgreSQL ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: segmentstation_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-segmentstation_auth}
      POSTGRES_USER:     ${POSTGRES_USER:-segmentstation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-segmentstation} -d ${POSTGRES_DB:-segmentstation_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: segmentstation_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Auth Gateway — Express.js ─────────────────────────────────────
  auth-gateway:
    build:
      context: ./auth-gateway
      dockerfile: Dockerfile
    container_name: segmentstation_auth
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # Syntaxe courte — Docker résout correctement la variable .env
      # Accessible uniquement depuis localhost → le reverse proxy fait le relais
      - "0.0.0.0:${GATEWAY_PORT:-3000}:3000"
    environment:
      NODE_ENV:       production
      PORT:           3000
      DATABASE_URL:   postgresql://${POSTGRES_USER:-segmentstation}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-segmentstation_auth}
      REDIS_URL:      redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET:     ${JWT_SECRET}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL:    ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      APP_DOMAIN:     ${APP_DOMAIN:-segmentstation.fr}
      MAILER_HOST:    ${MAILER_HOST:-}
      MAILER_PORT:    ${MAILER_PORT:-587}
      MAILER_USER:    ${MAILER_USER:-}
      MAILER_PASS:    ${MAILER_PASS:-}
    networks:
      - backend   # parle à postgres + redis
      - frontend  # expose le port vers l'hôte

volumes:
  postgres_data:
  redis_data:

networks:
  # backend : postgres + redis + auth-gateway se parlent entre eux
  # postgres et redis ne sont PAS dans frontend → non joignables depuis l'hôte
  backend:
    driver: bridge

  # frontend : uniquement auth-gateway, permet le port binding vers l'hôte
  frontend:
    driver: bridge
